<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SitRep</title>
    <link rel="stylesheet" href="main.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <div class="logo-mark">A</div>
            <div class="logo-text">Agile Style App</div>
          </div>
        </div>

        <nav class="sidebar-nav">
          <a href="#" class="nav-item active"> Dashboard </a>
          <a href="#" class="nav-item"> My Check-ins </a>
          <a href="#" class="nav-item"> Team </a>
          <a href="#" class="nav-item"> Weekly Report </a>
          <a href="#" class="nav-item"> Settings </a>
        </nav>

        <div class="sidebar-footer">
          <div class="user-row">
            <div class="avatar">U</div>
            <div class="user-info">
              <p class="user-name">Username</p>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <span class="topbar-title">Dashboard</span>
        </header>

        <main class="content-area" id="page-content">
          <div id="dashboard-view">
            <div class="section-header">
              <h2 class="section-title">Tasks</h2>
              <button class="btn-primary" id="add-task-btn">+ Add Task</button>
            </div>

            <div id="add-task-form" class="task-form hidden">
              <input type="text" id="new-task-title" class="task-input" placeholder="Task title" />
              <button class="btn-primary" id="submit-task-btn">Create</button>
              <button class="btn-secondary" id="cancel-task-btn">Cancel</button>
            </div>

            <div id="task-list" class="task-list">
              <p class="task-empty">Loading tasks...</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="main.js"></script>
  </body>
</html>
